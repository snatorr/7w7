    <style>.burbujas-container{position:fixed;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;z-index:9999}.frutiger-bubble{position:absolute;background:rgba(173,216,230,0.4);border-radius:50%;box-shadow:inset 0 0 10px rgba(255,255,255,0.8),inset -2px -2px 6px rgba(135,206,235,0.6),0 2px 10px rgba(173,216,230,0.3);bottom:-50px;transition:transform 0.3s linear,bottom 10s linear,opacity 0.5s ease-in-out}</style><script>document.addEventListener('DOMContentLoaded',()=>{const c=document.createElement('div');c.className='burbujas-container';document.body.appendChild(c);setInterval(()=>{const b=document.createElement('div');b.className='frutiger-bubble';const t=Math.random()*20+10;b.style.width=`${t}px`;b.style.height=`${t}px`;b.style.left=`${Math.random()*100}%`;const d=Math.random()*5+7;b.style.transition=`bottom ${d}s linear,transform ${d}s linear,opacity 0.5s`;c.appendChild(b);setTimeout(()=>{b.style.bottom='105%';b.style.transform=`translateX(${(Math.random()*100)-50}px)`},50);setTimeout(()=>b.remove(),d*1000)},500)});</script>
